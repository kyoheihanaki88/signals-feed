name: Build Edition

# Generate the next day's edition and open a PR for human review (see ADR-0001).
#
# Timing: the promise is "today's edition by 5:30 AM in the user's local time", and we commit to
# Tokyo (UTC+9) as the easternmost morning. 5:30 AM Tokyo = 20:30 UTC the previous day, so each
# edition must be merged + deployed BEFORE ~20:30 UTC on D-1. This runs at 17:00 UTC (D-1) and
# opens the PR, leaving a buffer for human review + merge before the deadline. GitHub cron is UTC.
#
# This NEVER merges or deploys: it only opens a PR. A human reviews and merges; Vercel deploys.
# The edition date is "tomorrow in UTC" (the morning it serves) — no timezone is pinned in code.

on:
  schedule:
    - cron: "0 17 * * *"        # 17:00 UTC daily — before the 20:30 UTC Tokyo-5:30 deadline, with buffer
  workflow_dispatch:            # manual "Run workflow" button
    inputs:
      date:
        description: "Edition date YYYY-MM-DD (default: tomorrow UTC)"
        required: false
        default: ""

permissions:
  contents: write               # create the publish/<date> branch
  pull-requests: write          # open the PR (never merges)

concurrency:
  group: build-edition
  cancel-in-progress: false

jobs:
  build-edition:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml        # build.py reads images.yaml; validators are stdlib-only

      - name: Resolve edition date (tomorrow UTC unless overridden)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            EDITION_DATE="${{ github.event.inputs.date }}"
          else
            EDITION_DATE="$(date -u -d '+1 day' +%Y-%m-%d)"
          fi
          echo "EDITION_DATE=$EDITION_DATE" >> "$GITHUB_ENV"
          echo "edition_date=$EDITION_DATE" >> "$GITHUB_OUTPUT"
          echo "Building edition for $EDITION_DATE (built $(date -u +%FT%TZ))"

      - name: Build the draft (build.py validates it)
        # Builds from the committed selection/drafts. build.py stamps the edition date and runs
        # validate_feed.py against the draft; a bad/empty build fails the run (an honest alert).
        run: python pipeline/build.py --date "$EDITION_DATE"

      - name: Write editions/<date>.json + latest.json (no git; consistency-checked)
        run: python pipeline/publish.py --write

      - name: Open review PR (no auto-merge)
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: "publish/${{ steps.date.outputs.edition_date }}"
          add-paths: |
            editions/
            latest.json
          commit-message: "Publish Signals edition ${{ steps.date.outputs.edition_date }}"
          title: "Publish Signals edition ${{ steps.date.outputs.edition_date }}"
          labels: edition
          delete-branch: false
          body: |
            Automated edition build for **${{ steps.date.outputs.edition_date }}** (the morning it serves).

            - `editions/${{ steps.date.outputs.edition_date }}.json` — immutable edition
            - `latest.json` — updated pointer to the newest edition

            The `validate-feed` check runs the per-file rules + the `--consistency` invariant.
            **Review and merge before ~20:30 UTC** (5:30 AM Tokyo) so it deploys in time.
            This PR was opened automatically and is **not** auto-merged — a human merge is required.
