name: Daily Auto Edition (manual PR fallback)

# Daily Auto Edition — REVIEW-PR mode (manual fallback; see DAILY_OPS.md → "Manual fallback").
#
# Same pipeline as Daily Auto Publish, but it opens a PR for human review instead of pushing to
# main. The scheduled morning run is now daily-auto-publish.yml (auto-publish); this workflow is
# MANUAL-ONLY (workflow_dispatch) — use it to review-before-publish, or if auto-publish is
# disabled / blocked by branch protection. It NEVER merges or deploys.
#
# Each step is a hard gate: a failure stops BEFORE the PR step, so latest.json and existing
# editions are never touched on a weak/stale/failed run.

on:
  workflow_dispatch:            # manual "Run workflow" only — no schedule (auto-publish owns the cron)
    inputs:
      date:
        description: "Edition date YYYY-MM-DD (default: today in America/New_York)"
        required: false
        default: ""

permissions:
  contents: write               # create the publish/<date> branch
  pull-requests: write          # open the PR (never merges)

concurrency:
  group: daily-auto-edition
  cancel-in-progress: false

jobs:
  auto-edition:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml        # scout/build read yaml; ranker/validators are stdlib-only

      - name: Resolve edition date (today in America/New_York unless overridden)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            EDITION_DATE="${{ github.event.inputs.date }}"
          else
            # ET-morning model — same default as Daily Auto Publish. (The old tomorrow-UTC
            # default here produced the accidental future-dated PR #68.)
            EDITION_DATE="$(TZ=America/New_York date +%Y-%m-%d)"
          fi
          echo "EDITION_DATE=$EDITION_DATE" >> "$GITHUB_ENV"
          echo "edition_date=$EDITION_DATE" >> "$GITHUB_OUTPUT"
          echo "## Daily Auto Edition — $EDITION_DATE" >> "$GITHUB_STEP_SUMMARY"
          echo "Built $(date -u +%FT%TZ)" >> "$GITHUB_STEP_SUMMARY"

      # GATE C — same future-date guard as Daily Auto Publish: never build more than
      # 1 day ahead of the East Coast calendar.
      - name: Gate — target is not more than 1 day ahead of America/New_York
        run: |
          MAX="$(TZ=America/New_York date -d '+1 day' +%Y-%m-%d)"
          echo "target=$EDITION_DATE · max allowed=$MAX (tomorrow ET)"
          if [[ "$EDITION_DATE" > "$MAX" ]]; then
            echo "::error::target $EDITION_DATE is more than 1 day ahead of the ET calendar (max $MAX) — refusing."
            exit 1
          fi

      # 1) Scout — collect today's candidates from live RSS. Exits non-zero on zero candidates.
      - name: Scout (live RSS)
        run: |
          python pipeline/scout.py \
            --sources pipeline/sources.yaml \
            --out pipeline/candidates.json \
            --max-age-hours 36 \
            --summary-file "$GITHUB_STEP_SUMMARY"

      # 2) Ranker — deterministic auto-selection → selection.yaml. HARD GATES: stops (exit 1) on
      #    <20 candidates, <5 real URLs, no lead-quality story, or <4 supporting → job fails, no PR.
      - name: Ranker (auto-select 5)
        run: |
          python pipeline/ranker.py \
            --candidates pipeline/candidates.json \
            --out pipeline/selection.yaml \
            --summary-file "$GITHUB_STEP_SUMMARY"

      # 3) Approval gate — only auto-approved selections proceed.
      - name: Gate — selection approved
        run: |
          grep -qx 'approved: true' pipeline/selection.yaml

      # 4) Selection — validate picks + assemble selection.json (metadata only, no copy).
      - name: Build selection.json
        run: python pipeline/selection.py build

      # 5) Writer — extractive drafts grounded in real source text only (never invents).
      - name: Writer (draft)
        run: python pipeline/writer.py draft

      # 6) Validate drafts — STRICT: hard-fail on thin_source / whyItMatters_needs_human / low
      #    confidence / missing keyTakeaways or whyItMatters. Stops here if the drafts aren't complete.
      - name: Validate drafts (strict)
        run: python pipeline/writer.py validate --strict

      # 6b) Auto-approve — ONLY after strict validation passes. Adds the approval build.py requires;
      #     the human still reviews the resulting PR before merge.
      - name: Auto-approve drafts
        run: |
          python - <<'PY'
          import json
          p = "pipeline/drafts.json"
          d = json.load(open(p))
          d["approved"] = True
          d["approved_by"] = "Daily Auto Edition"
          d["approved_note"] = "Auto-approved after passing draft validation gates (review in PR)."
          json.dump(d, open(p, "w"), ensure_ascii=False, indent=2)
          print("drafts.json -> approved: true (Daily Auto Edition)")
          PY

      # 7) Build the draft feed for the edition date (build.py re-checks approval + per-signal + feed).
      - name: Build draft feed
        run: python pipeline/build.py --date "$EDITION_DATE"

      # 7b) Localize (Japanese) — optional localized.ja from the FINAL English fields. Best-effort:
      #     per-signal failures skip (English-only) and no ANTHROPIC_API_KEY leaves the edition
      #     English-only. Never fails the run; the JA rides into the edition via publish.py below.
      - name: Localize Japanese (optional)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SIGNALS_JA_MODEL: ${{ vars.SIGNALS_JA_MODEL }}
        run: python pipeline/localize.py pipeline/generated/latest.draft.json

      # 8) Gate — the built edition date must match the date we intended (never mis-stamp).
      - name: Gate — edition date matches target
        run: |
          GOT="$(python -c "import json;print(json.load(open('pipeline/generated/latest.draft.json'))['date'])")"
          echo "draft date=$GOT target=$EDITION_DATE"
          test "$GOT" = "$EDITION_DATE"

      # 9) Promote into the date-keyed model (writes editions/<date>.json + latest.json, runs the
      #    --consistency check + stale-date regression guard). No git here — the PR step commits.
      - name: Publish (write files only)
        run: python pipeline/publish.py --write

      # 10) Open a review PR. NEVER auto-merges. Only reached if every gate above passed.
      - name: Open review PR (no auto-merge)
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          branch: "publish/${{ steps.date.outputs.edition_date }}"
          add-paths: |
            editions/
            latest.json
          commit-message: "Publish Signals edition ${{ steps.date.outputs.edition_date }} (auto)"
          title: "Publish Signals edition ${{ steps.date.outputs.edition_date }} (auto)"
          labels: edition, auto
          delete-branch: false
          body: |
            Automated **Daily Auto Edition** for **${{ steps.date.outputs.edition_date }}**.

            Pipeline: Scout → Ranker (deterministic auto-select) → selection → Writer (extractive)
            → draft validation → feed validation → consistency check. All safety gates passed.

            - `editions/${{ steps.date.outputs.edition_date }}.json` — immutable edition
            - `latest.json` — updated pointer to the newest edition

            **Review the five (especially the Lead) before merging** — the Ranker is rule-based v1
            and category labels come from the source feed, so a human still confirms editorial fit.
            Not auto-merged: a human merge is required, then Vercel deploys.
