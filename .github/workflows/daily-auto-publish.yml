name: Daily Auto Publish

# Daily Auto Edition — AUTO-PUBLISH via PR + AUTO-MERGE (see DAILY_OPS.md → "Auto Publish mode").
#
# Fully automatic, no human merge: every morning it runs the full pipeline and, ONLY if every
# safety gate passes, opens a PR with the two edition files and turns ON auto-merge — GitHub then
# merges it (immediately, or once required checks pass), and Vercel deploys. Trust over freshness:
# any weak/stale/uncertain morning FAILS CLOSED before the PR step, so the previous good latest.json
# and all existing editions are left untouched, and no PR is opened.
#
# Why PR + auto-merge instead of a direct push: it works whether or not `main` has branch
# protection (a protected `main` that blocks direct pushes still merges an auto-merge PR once its
# required checks pass), and it keeps validate-feed as a gate. See the branch-protection /
# required-settings notes in DAILY_OPS.md.
#
# Timing — MORNING DELIVERY SLO: the COMPLETE edition (5 signals + 5 EN audio) should be
# LIVE by 7:00 AM ET (= 11:00 UTC in EDT; 12:00 UTC in EST — even more slack in winter),
# so it's ready for wake-up → coffee → commute. GitHub cron regularly fires 1–3 h late,
# so the first attempt runs at 06:00 UTC (2:00 AM EDT) and hourly catch-up probes follow;
# even a worst-observed delay leaves the Listen chain time to finish before the commute.
# The edition is dated TODAY in America/New_York.
#
# Manual fallbacks (no schedule): daily-auto-edition.yml (review PR, no auto-merge) and
# build-edition.yml (build from committed drafts → review PR).

on:
  schedule:
    - cron: "0 6 * * *"         # 06:00 UTC — 2:00 AM EDT; first attempt (Morning Delivery SLO: live by 7:00 AM ET)
    - cron: "0 7 * * *"         # 07:00 UTC — catch-up probe; skips green if already published
    - cron: "0 8 * * *"         # 08:00 UTC — catch-up (GitHub cron delays observed at 1–3 h)
    - cron: "0 9 * * *"         # 09:00 UTC — catch-up
    - cron: "0 10 * * *"        # 10:00 UTC — catch-up; last start that can still beat the 11:00 UTC SLO
    - cron: "0 11 * * *"        # 11:00 UTC — SLO boundary (EDT); late safety net from here on
    - cron: "0 12 * * *"        # 12:00 UTC — late safety net
    - cron: "0 13 * * *"        # 13:00 UTC — late safety net
    - cron: "0 14 * * *"        # 14:00 UTC — final catch-up (Listen probes run through 14:45)
  workflow_dispatch:
    inputs:
      date:
        description: "Edition date YYYY-MM-DD (default: today in America/New_York)"
        required: false
        default: ""
      force:
        description: "Bypass the 'target must be newer than latest' gate (Gate B) — manual recovery only"
        required: false
        default: "false"

permissions:
  contents: write               # create the publish/<date> branch
  pull-requests: write          # open the PR + enable auto-merge

concurrency:
  group: daily-auto-publish
  cancel-in-progress: false

jobs:
  # ── 0) Catch-up probe (SCHEDULED runs only) ────────────────────────────────────────────
  # With hourly catch-up crons, most runs of a healthy day arrive AFTER the edition already
  # published — those must skip GREEN, not fail red on Gate A. This probe only decides
  # "is there anything left to do today?"; every safety gate (A/B/C, strict validation,
  # sync, pre-push guard) still runs unchanged inside auto-publish itself.
  # Manual dispatches BYPASS this probe entirely: recovery stays direct and unchanged.
  # The check never exits non-zero (fail-open to publishing — Gate A backstops overwrites;
  # a transient probe failure just defers to the next hourly cron).
  probe:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needed: ${{ steps.check.outputs.needed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check — is today's ET edition already published or in progress?
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE="$(TZ=America/New_York date +%Y-%m-%d)"
          if [ -f "editions/${DATE}.json" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "## Daily Auto Publish — ${DATE}: already published ✅ (editions/${DATE}.json is on main) → skip" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          OPEN_PR="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "publish/${DATE}" --json number --jq 'length' 2>/dev/null || echo 0)"
          if [ "${OPEN_PR:-0}" -ge 1 ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "## Daily Auto Publish — ${DATE}: publish already in progress ✅ (open publish/${DATE} PR) → skip" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "## Daily Auto Publish — ${DATE}: no edition on main and no open publish PR → publishing" >> "$GITHUB_STEP_SUMMARY"

  auto-publish:
    needs: probe
    # Runs when: manual dispatch (probe skipped — recovery path unchanged), or a scheduled
    # run whose probe found work to do. `!cancelled()` lets this run despite the probe job
    # being skipped on workflow_dispatch.
    if: ${{ !cancelled() && (github.event_name != 'schedule' || needs.probe.outputs.needed == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml    # scout/build read yaml; ranker/validators are stdlib-only

      - name: Resolve edition date (today in America/New_York unless overridden)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            EDITION_DATE="${{ github.event.inputs.date }}"
          else
            # ET-morning schedule: the edition IS today's date on the East Coast.
            # (TZ, not "+1 day" — that belonged to the old Tokyo-morning schedule.)
            EDITION_DATE="$(TZ=America/New_York date +%Y-%m-%d)"
          fi
          echo "EDITION_DATE=$EDITION_DATE" >> "$GITHUB_ENV"
          echo "edition_date=$EDITION_DATE" >> "$GITHUB_OUTPUT"
          {
            echo "## Daily Auto Publish — $EDITION_DATE"
            echo "Built $(date -u +%FT%TZ) · mode: PR + auto-merge"
          } >> "$GITHUB_STEP_SUMMARY"

      # GATE C — never publish more than 1 day ahead of the East Coast calendar. This is
      # what makes a stray future-dated run (the old tomorrow-UTC default, a typo'd manual
      # date) fail closed instead of pinning latest.json to a date that hasn't happened.
      - name: Gate — target is not more than 1 day ahead of America/New_York
        run: |
          MAX="$(TZ=America/New_York date -d '+1 day' +%Y-%m-%d)"
          echo "target=$EDITION_DATE · max allowed=$MAX (tomorrow ET)"
          if [[ "$EDITION_DATE" > "$MAX" ]]; then
            echo "::error::target $EDITION_DATE is more than 1 day ahead of the ET calendar (max $MAX) — refusing."
            echo "- SKIPPED: target too far in the future ($EDITION_DATE > $MAX)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # GATE A — never overwrite an existing edition (immutability).
      - name: Gate — target edition does not already exist
        run: |
          if [ -f "editions/${EDITION_DATE}.json" ]; then
            echo "::error::editions/${EDITION_DATE}.json already exists — refusing to overwrite a published edition."
            echo "- SKIPPED: editions/${EDITION_DATE}.json already exists" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # GATE B — never move latest.json backwards (or republish the same date).
      # `force: true` (manual dispatch only) bypasses THIS gate for recovery scenarios;
      # Gates A and C always apply.
      - name: Gate — target is newer than current latest.json
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "::warning::Gate B BYPASSED via force=true (manual dispatch) — target $EDITION_DATE may not be newer than latest."
            echo "- Gate B bypassed via force=true" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          PREV="$(python -c "import json,os;print(json.load(open('latest.json'))['date'] if os.path.exists('latest.json') else '')")"
          echo "current latest=$PREV · target=$EDITION_DATE"
          # ISO YYYY-MM-DD compares correctly lexicographically. Require target strictly newer.
          if [ -n "$PREV" ] && ! [[ "$EDITION_DATE" > "$PREV" ]]; then
            echo "::error::target $EDITION_DATE is not newer than current latest.json ($PREV) — refusing to move backwards or republish."
            echo "- SKIPPED: target not newer than latest ($PREV)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # 1) Scout — live RSS → candidates.json. Exits non-zero on zero candidates.
      - name: Scout (live RSS)
        run: |
          python pipeline/scout.py \
            --sources pipeline/sources.yaml \
            --out pipeline/candidates.json \
            --max-age-hours 36 \
            --summary-file "$GITHUB_STEP_SUMMARY"

      # 2–6) Ranker → selection → Writer draft → STRICT validation, orchestrated WITH
      #    AUTOMATIC RECOVERY (Fix 1). Identical components, identical gates, identical
      #    strictness — validation rules are unchanged and still fail-closed. When one
      #    extracted draft fails strict validation (the 2026-07-22 incident: six runs
      #    blocked by "[0ebcac] missing ['keyTakeaways']"), recovery A refetches +
      #    redrafts the failed story once; recovery B then deterministically re-ranks
      #    WITHOUT the still-failing candidate id(s) (ranker --exclude) for at most 3
      #    replacement rounds — at most 5 strict validations in total. Ranking authority,
      #    diversity, lead selection, and every eligibility gate stay with ranker.py /
      #    selection.py. Pool exhaustion or a selection-level failure fails closed —
      #    never a partial or 4-story edition. Every attempted candidate is recorded in
      #    pipeline/out/drafts.json (uploaded below, if: always()).
      - name: Rank, draft, validate (with automatic recovery)
        run: |
          python pipeline/publish_recovery.py \
            --date "$EDITION_DATE" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      # Attempts audit — uploaded on success AND failure (no silent drops; ids/titles/
      # URLs and validator messages only — no article bodies, no secrets).
      - name: Upload publish attempts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-attempts-${{ env.EDITION_DATE }}
          path: pipeline/out/drafts.json
          if-no-files-found: ignore
          retention-days: 14

      # 3) Approval gate — only auto-approved selections proceed (unchanged; the recovery
      #    step's final selection.yaml is what gets checked).
      - name: Gate — selection approved
        run: |
          grep -qx 'approved: true' pipeline/selection.yaml

      # 6b) Auto-approve — ONLY reached after strict validation passes. Adds the top-level approval
      #     build.py requires. (build.py still re-checks every per-signal gate independently.)
      - name: Auto-approve drafts
        run: |
          python - <<'PY'
          import json
          p = "pipeline/drafts.json"
          d = json.load(open(p))
          d["approved"] = True
          d["approved_by"] = "Daily Auto Publish"
          d["approved_note"] = "Auto-approved after passing draft validation gates."
          json.dump(d, open(p, "w"), ensure_ascii=False, indent=2)
          print("drafts.json -> approved: true (Daily Auto Publish)")
          PY

      # 7) Build the draft feed (build.py re-checks approval + per-signal gates + validate_feed).
      - name: Build draft feed
        run: python pipeline/build.py --date "$EDITION_DATE"

      # 7b) Localize (Japanese) — add optional localized.ja from the FINAL English fields. Best-effort:
      #     per-signal failures are skipped (English-only for that signal) and a missing
      #     ANTHROPIC_API_KEY simply leaves the edition English-only. Not strict → never fails the run.
      #     The Japanese rides into editions/<date>.json + latest.json through publish.py below.
      - name: Localize Japanese (optional)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SIGNALS_JA_MODEL: ${{ vars.SIGNALS_JA_MODEL }}
        run: python pipeline/localize.py pipeline/generated/latest.draft.json

      # 8) Gate — built edition date must match the target (never mis-stamp).
      - name: Gate — draft date matches target
        run: |
          GOT="$(python -c "import json;print(json.load(open('pipeline/generated/latest.draft.json'))['date'])")"
          echo "draft date=$GOT · target=$EDITION_DATE"
          test "$GOT" = "$EDITION_DATE"

      # 9) Promote into the date-keyed model: writes editions/<date>.json + latest.json, runs the
      #    --consistency check + stale-date regression guard. No git here — the PR step commits.
      - name: Publish (write files only)
        run: python pipeline/publish.py --write

      # 10) Gate — the EDITION now carries the target date. latest.json is intentionally NOT
      #     advanced here (fail-closed): Auto Generate Listen promotes latest.json to this date once
      #     EN Listen audio exists for all 5, so the served pointer is never audio-less.
      - name: Gate — edition carries the target date (latest.json intentionally not advanced)
        run: |
          GOT="$(python -c "import json;print(json.load(open('editions/${EDITION_DATE}.json'))['date'])")"
          echo "edition date=$GOT · target=$EDITION_DATE"
          test "$GOT" = "$EDITION_DATE"
          LATEST="$(python -c "import json;print(json.load(open('latest.json'))['date'])")"
          echo "latest.json still at $LATEST (Auto Generate Listen will promote it to $EDITION_DATE)"

      # 10c) Image-variety check (WARN-ONLY): report if this edition reuses an imageURL from the last
      #      90 editions (the reuse cooldown). build.py already avoids reuse; this never fails the run.
      - name: Image reuse check (warn-only, 90-edition cooldown)
        run: |
          if python validate_feed.py --image-reuse .; then
            echo "image reuse: OK (no imageURL reused within the 90-edition cooldown)"
          else
            echo "::warning::this edition reuses an imageURL within the 90-edition cooldown (pools may be too small — add verified images). Publishing continues."
          fi

      # 10d) SYNC WITH LATEST MAIN — the anti-conflict step. The job checked out main at
      #      start; anything that merged since (a Listen PR, a backfill, a manual fix)
      #      moves main and would leave this PR stuck "conflicted" — GitHub auto-merge cannot
      #      resolve even trivial conflicts (that is exactly how PR #60 got stuck). So: keep the
      #      freshly built EDITION artifact, hard-reset onto CURRENT origin/main, re-run the safety
      #      gates against that fresh base, put the edition back, and re-validate.
      #
      #      FAIL-CLOSED: this job no longer owns latest.json — it publishes ONLY editions/<date>.json,
      #      and Auto Generate Listen promotes latest.json once EN audio exists. So we must NOT save or
      #      restore latest.json here: doing so could clobber a newer pointer that Listen advanced on
      #      main during this run. Whatever latest.json fresh main has, we keep.
      - name: Sync with latest main (publish EDITION only; latest.json owned by Listen)
        run: |
          set -euo pipefail
          cp "editions/${EDITION_DATE}.json" /tmp/publish-edition.json
          git fetch origin main
          BEFORE="$(git rev-parse HEAD)"; AFTER="$(git rev-parse origin/main)"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "main unchanged since checkout ($BEFORE) — no sync needed"
          else
            echo "main moved: $BEFORE → $AFTER — re-basing publish artifacts onto fresh main"
            git reset --hard origin/main
            # Re-run Gate A on the FRESH base: the edition may have been published meanwhile.
            if [ -f "editions/${EDITION_DATE}.json" ]; then
              echo "::error::editions/${EDITION_DATE}.json appeared on main during this run — refusing to overwrite."
              exit 1
            fi
            # Re-run Gate B on the FRESH base (unless force): latest may have advanced past target.
            if [ "${{ github.event.inputs.force }}" != "true" ]; then
              PREV="$(python -c "import json,os;print(json.load(open('latest.json'))['date'] if os.path.exists('latest.json') else '')")"
              if [ -n "$PREV" ] && ! [[ "$EDITION_DATE" > "$PREV" ]]; then
                echo "::error::fresh main's latest.json ($PREV) is already >= target $EDITION_DATE — refusing to move backwards."
                exit 1
              fi
            fi
            cp /tmp/publish-edition.json "editions/${EDITION_DATE}.json"
          fi
          # Validation AFTER any resolution — the repo state must still be coherent. latest.json is
          # fresh main's (we did not touch it); --consistency allows our new edition to be a newer
          # "pending" edition while latest.json still points at the newest Listen-complete one.
          python validate_feed.py latest.json
          python validate_feed.py --consistency .
          echo "- Synced with latest main (edition only); validation re-passed on fresh base" >> "$GITHUB_STEP_SUMMARY"

      # 11) PRE-PUSH GUARD — the working tree may contain ONLY the single edition file. Under
      #     fail-closed publishing this job does NOT touch latest.json, so latest.json must NOT
      #     appear in the diff (that would be an unexpected pointer change here).
      - name: Clean Python cache before guard
        run: |
          find . -type d -name "__pycache__" -prune -exec rm -rf {} +
          find . -type f -name "*.pyc" -delete

      - name: Pre-push guard — only the edition file changed (latest.json untouched)
        run: |
          ED="editions/${EDITION_DATE}.json"
          CHANGED="$(git status --porcelain)"
          echo "working-tree changes:"; echo "$CHANGED"
          ok=1
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            p="${line:3}"
            if [ "$p" != "$ED" ]; then
              echo "::error::unexpected change outside the single publish file ($ED): $p"; ok=0
            fi
          done <<< "$CHANGED"
          echo "$CHANGED" | grep -qF "$ED" || { echo "::error::missing new file $ED"; ok=0; }
          [ "$ok" = 1 ] || { echo "- SKIPPED: pre-push guard failed" >> "$GITHUB_STEP_SUMMARY"; exit 1; }

      # 12) Open the PR with ONLY the edition file (latest.json is NOT advanced here — Auto Generate
      #     Listen promotes it once EN audio exists). Uses SIGNALS_PAT if set (so the PR triggers
      #     validate-feed, letting auto-merge gate on it); else the built-in token (gates already
      #     ran in this job). Only reached if every gate above passed.
      - name: Open publish PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SIGNALS_PAT || github.token }}
          base: main
          branch: "publish/${{ steps.date.outputs.edition_date }}"
          add-paths: |
            editions/
          commit-message: "Publish Signals edition ${{ steps.date.outputs.edition_date }}"
          title: "Publish Signals edition ${{ steps.date.outputs.edition_date }}"
          labels: edition, auto
          delete-branch: true
          body: |
            Automated **Daily Auto Publish** for **${{ steps.date.outputs.edition_date }}** — opened
            with auto-merge ON. All pipeline safety gates passed in the build job; `validate-feed`
            re-checks the edition here.

            - `editions/${{ steps.date.outputs.edition_date }}.json` — immutable edition (pending EN audio)
            - `latest.json` is intentionally **not** advanced here. Auto Generate Listen promotes it
              to this date once EN Listen audio exists for all 5 signals (fail-closed: the served
              pointer is never audio-less).

      # 13) Merge the publish PR RELIABLY, or FAIL LOUDLY. Tries an immediate squash merge (all
      #     safety gates already ran in this job); if branch protection blocks that, enables
      #     auto-merge so it lands when required checks pass. Then it VERIFIES the outcome: if the PR
      #     is neither merged nor set to auto-merge, the job FAILS (no silent "opened, merge manually").
      - name: Merge publish PR (or fail loudly)
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.SIGNALS_PAT || github.token }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
          EDITION_DATE: ${{ steps.date.outputs.edition_date }}
        run: |
          set -uo pipefail
          echo "Merging publish PR #$PR for $EDITION_DATE"
          how=""
          if gh pr merge "$PR" --squash --delete-branch; then
            how="immediate-squash"
          elif gh pr merge "$PR" --squash --auto --delete-branch; then
            how="auto-merge-enabled"
          else
            echo "::warning::both immediate-merge and auto-merge-enable calls failed for PR #$PR"
          fi
          merged=$(gh pr view "$PR" --json merged -q .merged 2>/dev/null || echo unknown)
          automq=$(gh pr view "$PR" --json autoMergeRequest -q '.autoMergeRequest != null' 2>/dev/null || echo false)
          state=$(gh pr view "$PR" --json state,mergeStateStatus -q '.state + " / " + (.mergeStateStatus // "n/a")' 2>/dev/null || echo unknown)
          echo "PR #$PR — attempt=${how:-none} merged=$merged autoMerge=$automq state=$state"
          if [ "$merged" = "true" ]; then
            echo "### Merged ✅ PR #$PR ($EDITION_DATE) via ${how}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$automq" = "true" ]; then
            echo "### Auto-merge enabled ✅ PR #$PR ($EDITION_DATE) — merges when checks pass" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::PR #$PR for $EDITION_DATE is NOT merged and auto-merge is NOT enabled (state=$state). Enable 'Allow auto-merge' (repo Settings → General), make validate-feed a required check on main, and ensure SIGNALS_PAT has repo + PR write. Failing loudly."
            echo "### FAILED ❌ PR #$PR ($EDITION_DATE) — not merged, auto-merge not enabled" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # 14) Close STALE open publish PRs older than the edition we just published, so a late merge can
      #     never move latest.json backwards. Only touches publish/<YYYY-MM-DD> branches with an OLDER
      #     date (lexical = chronological); never the current PR. Best-effort (won't fail the run).
      - name: Close stale publish PRs
        if: always() && steps.date.outputs.edition_date
        env:
          GH_TOKEN: ${{ secrets.SIGNALS_PAT || github.token }}
          NEWEST: ${{ steps.date.outputs.edition_date }}
        run: |
          set -uo pipefail
          echo "Newest edition = $NEWEST — scanning open publish PRs for older dates"
          gh pr list --state open --base main --json number,headRefName \
            --jq '.[] | [.number, .headRefName] | @tsv' | while IFS=$'\t' read -r num branch; do
            case "$branch" in
              publish/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9])
                d="${branch#publish/}"
                if [[ "$d" < "$NEWEST" ]]; then
                  echo "Closing stale PR #$num ($branch): $d < $NEWEST"
                  if gh pr close "$num" --delete-branch \
                       --comment "Superseded by edition $NEWEST — closing to avoid a latest.json regression (stale edition $d)."; then
                    echo "### Closed stale PR #$num ($d) — older than $NEWEST" >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "::warning::failed to close stale PR #$num"
                  fi
                else
                  echo "Keeping PR #$num ($branch): $d >= $NEWEST"
                fi ;;
              *) echo "Skipping non-publish branch: $branch" ;;
            esac
          done
