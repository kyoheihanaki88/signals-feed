name: validate-feed

# Publish gate: on every PR to main, validate the date-keyed feed with validate_feed.py.
# It validates any latest.json / editions/*.json the PR changes, then runs the repo-level
# --consistency invariant (latest.json == newest edition, no stale regression). It only acts
# when the PR actually touches feed files, so unrelated PRs pass untouched. Timezone-agnostic:
# no TZ is set — the validator does not pin Asia/Tokyo (see ADR-0001). Read-only.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read          # read-only — this check can never publish, merge, or deploy

jobs:
  validate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # validate_feed.py is stdlib-only — no pip install needed

      - name: Detect changed feed files (latest.json / editions/*.json)
        id: changed
        run: |
          files="$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              | grep -E '^(latest\.json|editions/.*\.json)$' || true)"
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$files" ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi

      - name: Validate changed feed files + repo consistency
        if: steps.changed.outputs.any == 'true'
        run: |
          set -e
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::validate $f"
            python3 validate_feed.py "$f"
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.files }}"
          echo "::group::consistency (latest.json == newest edition)"
          python3 validate_feed.py --consistency .
          echo "::endgroup::"

      - name: No feed change — validation skipped
        if: steps.changed.outputs.any != 'true'
        run: echo "No latest.json / editions changes in this PR — feed validation skipped (pass)."
