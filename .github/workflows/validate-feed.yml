name: validate-feed

# Publish gate: on every PR to main, validate the live feed with validate_feed.py.
# It ONLY validates latest.json when the PR actually changes it (the feed's date==today
# rule would otherwise fail unrelated PRs). Read-only: never writes, merges, or deploys.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read          # read-only — this check can never publish, merge, or deploy

jobs:
  validate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Match the Builder's date (set on the Mac in JST). validate_feed.py uses
      # date.today(), which is UTC on the runner; without this the JST feed date
      # would read as "tomorrow" and fail. Adjust if the publishing timezone changes.
      TZ: Asia/Tokyo
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # validate_feed.py is stdlib-only — no pip install needed

      - name: Detect whether latest.json changed in this PR
        id: changed
        run: |
          if git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" | grep -qx 'latest.json'; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate latest.json (only when the feed changed)
        if: steps.changed.outputs.changed == 'true'
        run: python3 validate_feed.py latest.json   # non-zero exit fails the check → PR unmergeable

      - name: Feed not modified — validation skipped
        if: steps.changed.outputs.changed != 'true'
        run: echo "latest.json was not modified in this PR — feed validation skipped (pass)."
