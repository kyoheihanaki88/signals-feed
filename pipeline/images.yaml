# Signals — CATEGORY-BASED editorial mood photography (1.0).
#
# Signals is a Morning Ritual, not a news app. Images provide CONTEXT, not documentation —
# "this belongs with the story", never "this depicts the story". Aesthetic: Monocle / FT Weekend /
# Economist 1843 / Kinfolk. STRICTLY no breaking news, war, politicians, disasters, crime, protests,
# violence, celebrity, or literal event imagery.
#
# Each Scout category has its own ~10-image pool. build.py picks from the SIGNAL'S category pool,
# rotates daily (day-of-year), and never repeats an image within the same issue.
#
# RELIABILITY: these URLs are curated CANDIDATES and are mostly UNVERIFIED from here. Before
# publishing, run:  python3 pipeline/build.py --verify-images   (on a networked machine) — it
# HTTP-checks every URL and DROPS dead ones, printing a per-pool reachable count. Backfill any
# pool that drops below ~5. [✓ = confirmed working previously]

# Scout categories not given a dedicated pool fall back through these aliases:
aliases:
  FINANCE: BUSINESS
  ECONOMY: BUSINESS
  OTHER: WORLD

# Used only if a category has no pool and no alias resolves:
default_pool:
  - { imageURL: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=900&q=80&auto=format&fit=crop", placeTime: "City morning" }   # ✓
  - { imageURL: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=900&q=80&auto=format&fit=crop", placeTime: "Morning light" }   # ✓
  - { imageURL: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=900&q=80&auto=format&fit=crop", placeTime: "At the desk" }      # ✓

