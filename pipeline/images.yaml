# Signals — editorial MOOD photography for the feed (1.0 image strategy).
#
# Atmosphere, NOT journalism. Calm, abstract morning/editorial images — never topic-literal,
# never implying a specific event, person, location, war, politics, or disaster. Every category
# maps to the same small curated mood pool; build.py de-dups so signals 2–5 get distinct images.
# (The Lead's image is overridden app-side by PhotographyPool.)
#
# Pool — ONLY confirmed-working Unsplash CDN URLs (these shipped in the earlier deployed feed):
#   cafe         photo-1499750310107-5fef28a66643   (coffee on wood — warm morning)
#   desk         photo-1540959733332-eab4deabeeaf   (quiet stationery desk)
#   city morning photo-1501339847302-ac426a4a7cbb   (soft city skyline)
#
# Richer themes (newspaper / window light / train / quiet street) are held back until their
# URLs are verified with `curl -I` on the Mac — then they can be added here.

default:
  imageURL: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=900&q=80&auto=format&fit=crop"
  placeTime: "Morning light"

