# ─────────────────────────────────────────────────────────────────────────────────────────────
# TOPIC layer (1.1) — story-aware selection ABOVE the broad category pools.
#
# build.py scores each story's headline + summary against `topic_keywords` (whole-word match) and,
# if a topic wins, draws its image from that topic's pool — so two WORLD stories about very
# different subjects (a strike vs. a port, a court ruling vs. an election) get visually distinct,
# symbolically fitting images instead of the same generic category placeholder. No keyword match →
# falls back to the category pool (unchanged behavior).
#
# STILL context, never documentation. Pools are composed only from the curated images above
# (calm / symbolic — Monocle / FT Weekend), so there is STRICTLY no war, violence, disaster, crime,
# protest, or literal event imagery — even for `conflict`, which deliberately uses quiet
# night-city / horizon symbolism, never military or graphic content.

# Story keywords → topic. Whole-word, case-insensitive. Highest match count wins (ties: topic name).
topic_keywords:
  conflict:   [war, strike, strikes, airstrike, "air strike", missile, missiles, attack, attacks, military, troops, soldiers, offensive, nuclear, warhead, shelling, invasion, frontline, combat, militants]
  diplomacy:  [diplomat, diplomacy, talks, summit, negotiation, negotiations, ceasefire, truce, treaty, accord, sanctions, embassy, ambassador, "foreign minister", "peace talks", alliance, nato, "united nations"]
  government: [government, parliament, congress, senate, minister, president, "prime minister", policy, capitol, administration, cabinet, lawmakers, "white house", official, regime]
  election:   [election, elections, vote, votes, voting, ballot, ballots, poll, polls, "mail-in", referendum, candidate, campaign, primary, electoral, turnout]
  protest:    [protest, protests, demonstration, rally, march, unrest, riot, crowd, picket, walkout]
  drones:     [drone, drones, uav, unmanned, robot, robots, robotics, autonomous, quadcopter]
  technology: [technology, tech, device, devices, gadget, hardware, software, app, apps, platform, smartphone, computing, internet]
  ai:         [ai, "artificial intelligence", "machine learning", neural, model, models, chatbot, chatgpt, openai, anthropic, llm, gpu, chip, chips, semiconductor, nvidia, inference]
  cyber:      [cyber, cyberattack, hack, hacking, hacked, breach, ransomware, malware, phishing, "data breach", exploit, vulnerability]
  economy:    [economy, economic, inflation, gdp, recession, growth, tariff, tariffs, trade, exports, imports, jobs, unemployment, wages, fed, "federal reserve", "interest rate", rates, "cost of living", "supply chain"]
  markets:    [market, markets, stocks, stock, shares, equities, "wall street", nasdaq, dow, index, bonds, yields, volatility, selloff, "sell-off", rally, ipo, earnings, investors, trading]
  business:   [company, companies, business, ceo, merger, acquisition, startup, startups, layoffs, profit, revenue, deal, firm, corporate, bankruptcy, valuation]
  energy:     [energy, oil, gas, crude, opec, barrel, "power grid", electricity, grid, pipeline, renewable, renewables, solar, "wind power", reactor, refinery, fuel]
  climate:    [climate, weather, storm, flood, flooding, wildfire, heatwave, drought, emissions, carbon, warming, hurricane, typhoon, temperatures, environment]
  space:      [space, rocket, launch, spacex, nasa, satellite, satellites, orbit, orbital, mars, moon, lunar, astronaut, spacecraft, telescope]
  courts:     [court, "supreme court", judge, trial, lawsuit, ruling, verdict, charges, indictment, indicted, prosecutor, prosecution, appeal, legal, sentenced]
  japan:      [japan, japanese, tokyo, kyoto, osaka, yen, nikkei, ldp, nhk, ishiba]

# Topic → image pool (composed only from the curated images above; calm + symbolic).
topic_pools:
  conflict:   # quiet night-city / horizon / distance — NEVER military or graphic
