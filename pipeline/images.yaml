# Signals — editorial MOOD photography library (1.0). ~45 calm, timeless images.
#
# Signals is a Morning Ritual, not a news app: images create ATMOSPHERE, never illustrate the
# story. Aesthetic: Monocle / Kinfolk / Apple Journal / editorial newspaper. Allowed themes only —
# cafe, desk, morning light, city morning, transit, reading, architecture. STRICTLY no politicians,
# protests, war, disasters, military, crime, charts, product shots, celebrities, or portraits-as-subject.
#
# build.py rotates this pool daily (day-of-year) and assigns DISTINCT images to the 5 signals, so a
# day never repeats and the set drifts week to week. The Lead's image is overridden by PhotographyPool.
#
# RELIABILITY: only 3 URLs are confirmed (✓, shipped before). Before publishing, run
#   python3 pipeline/build.py --verify-images
# on a networked machine — it HTTP-checks every URL and DROPS any that fail, so only working images
# ship. Replace any that get dropped over time to keep the library near ~45.

default:
  imageURL: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=900&q=80&auto=format&fit=crop"
  placeTime: "Morning light"

