# Signals — curated DECORATIVE images for the feed (Builder image strategy).
#
# Atmosphere, NOT journalism: never scraped article photos, never evidence of anything in the
# story — just a calm, category-appropriate mood image + a time-of-day caption.
#
# These are known-working Unsplash CDN URLs (the same ones the original seed feed used and that
# the app displayed correctly). `default` is the safe fallback — a warm cafe/coffee image used
# for any category not listed below.
#
# placeTime is an atmospheric caption (time-of-day / mood), deliberately NOT a specific place
# claim tied to the story.

default:
  imageURL: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=900&q=80&auto=format&fit=crop"
  placeTime: "Morning light"

