# Signals — curated DECORATIVE images for the feed (Builder v1 image strategy).
#
# These are atmosphere, NOT journalism. They are never scraped article photos and never
# evidence of anything in the story — just a calm, category-appropriate mood image + a
# time-of-day caption. The Builder maps each signal's `category` → one of these.
# Replace the placeholder URLs with the curator's real Signals decorative asset pool.
#
# placeTime is an atmospheric caption (time-of-day / mood), deliberately NOT a specific
# place claim tied to the story.

default:
  imageURL: "https://images.signalsapp.co/decorative/world-dawn.jpg"
  placeTime: "Morning light"

